<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 470" width="820" height="470" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" role="img" aria-label="ClickCron self-healing run: a broken selector is repaired by AI and the check stays green">
  <defs>
    <style>
      .row { opacity: 1; }
      @keyframes reveal { from { opacity: 0 } to { opacity: 1 } }
      @media (prefers-reduced-motion: no-preference) {
        .row { opacity: 0; animation: reveal 0.35s ease forwards; }
        .r1 { animation-delay: 0.2s } .r2 { animation-delay: 0.9s }
        .r3 { animation-delay: 1.5s } .r4 { animation-delay: 2.2s }
        .r5 { animation-delay: 3.0s } .r6 { animation-delay: 3.7s }
        .r7 { animation-delay: 4.4s } .r8 { animation-delay: 5.1s }
        .cursor { animation: blink 1.1s steps(1) infinite; }
        @keyframes blink { 50% { opacity: 0 } }
      }
      text { font-size: 16px; }
      .dim { fill: #8b97a3 }
      .green { fill: #14e3a3 }
      .magenta { fill: #d98cff }
      .red { fill: #ff6b6b }
      .white { fill: #e8edf2 }
      .accent { fill: #0bbf87 }
    </style>
  </defs>

  <rect x="0" y="0" width="820" height="470" rx="16" fill="#0a0c0f"/>
  <rect x="0.5" y="0.5" width="819" height="469" rx="16" fill="none" stroke="#232a31"/>

  <!-- title bar -->
  <g>
    <circle cx="28" cy="28" r="6.5" fill="#ff5f56"/>
    <circle cx="50" cy="28" r="6.5" fill="#ffbd2e"/>
    <circle cx="72" cy="28" r="6.5" fill="#27c93f"/>
    <text x="410" y="33" text-anchor="middle" class="dim" font-size="14">clickcron — self-healing run</text>
  </g>
  <line x1="0" y1="54" x2="820" y2="54" stroke="#232a31"/>

  <g transform="translate(28, 92)">
    <text class="row r1"><tspan class="accent">$</tspan><tspan class="white" dx="10">clickcron run price-checker</tspan></text>

    <text y="38" class="row r2"><tspan class="accent">ℹ</tspan><tspan class="dim" dx="10">Run started for "price-checker"</tspan></text>

    <text y="72" class="row r3"><tspan class="green" dx="18">✓</tspan><tspan class="dim" dx="10">product-title resolved</tspan></text>

    <text y="106" class="row r4"><tspan class="red" dx="18">✗</tspan><tspan class="dim" dx="10">buy-button (#buy) no longer matches the page</tspan></text>

    <text y="140" class="row r5"><tspan class="magenta">🔧</tspan><tspan class="magenta" dx="8">Healing with claude-haiku-4-5 …</tspan></text>

    <text y="174" class="row r6"><tspan class="magenta">🔧</tspan><tspan class="white" dx="8">Healed "buy-button" → </tspan><tspan class="accent">role button "Buy now"</tspan></text>

    <text y="208" class="row r7"><tspan class="accent">ℹ</tspan><tspan class="dim" dx="10">heal recorded → result.json · selector persisted to recipe</tspan></text>

    <text y="246" class="row r8"><tspan class="green">✓</tspan><tspan class="green" dx="10">Run completed — 1 selector self-healed. </tspan><tspan class="white" font-size="15">▌</tspan></text>
  </g>
</svg>
